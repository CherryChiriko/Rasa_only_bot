version: "3.1"

rules:

- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Say 'I am a bot' anytime the user challenges
  steps:
  - intent: bot_challenge
  - action: utter_iamabot

- rule: Ask for human agent - collect details
  steps:
  - intent: ask_human
  - action: utter_ask_ticket_details

- rule: User provides ticket details
  condition:
  - active_loop: null
  steps:
  - intent: inform
  - action: action_transfer_to_human

- rule: Handle Transfer Affirmation
  steps:
  - intent: affirm
  - action: action_transfer_to_human

- rule: View ticket
  steps:
  - intent: view_ticket
  - action: action_view_ticket

- rule: Activate Ticket Form
  steps:
  - intent: ask_human
  - action: ticket_form
  - active_loop: ticket_form

- rule: Submit Ticket Form
  condition:
  - active_loop: ticket_form
  steps:
  - action: ticket_form
  - active_loop: null
  - slot_was_set:
      - requested_slot: null
  - action: action_submit_ticket_form

- rule: Not understand - fallback
  steps:
    - intent: nlu_fallback
    - action: utter_default

- rule: Handle gibberish or low confidence
  steps:
  - intent: nlu_fallback
  - action: utter_ask_rephrase

- rule: Handle off-topic questions
  steps:
  - intent: out_of_scope
  - action: utter_out_of_scope