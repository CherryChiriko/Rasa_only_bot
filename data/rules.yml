version: "3.1"

rules:

- rule: Greet the user
  steps:
    - intent: greet
    - action: utter_greet

- rule: Say goodbye anytime the user says goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: Say I am a bot anytime the user challenges
  steps:
    - intent: bot_challenge
    - action: utter_iamabot

- rule: Handle off-topic questions
  steps:
    - intent: out_of_scope
    - action: utter_out_of_scope

- rule: Handle inform failure
  steps:
    - intent: inform_failure
    - action: utter_inform_failure

- rule: Handle low NLU confidence
  steps:
    - intent: nlu_fallback
    - action: action_context_aware_fallback

# --- Ticket Form Rules ---

- rule: Activate ticket form on problem report
  steps:
    - intent: report_problem
    - action: ticket_form
    - active_loop: ticket_form

- rule: Activate ticket form on new ticket request
  steps:
    - intent: new_ticket
    - action: ticket_form
    - active_loop: ticket_form

# --- Button trigger rules (called by Streamlit via /trigger_intent) ---

# Fired when user clicks "❌ Annuler / Modifier par chat"
- rule: Reset ticket on trigger
  steps:
    - intent: trigger_reset_ticket
    - action: action_reset_ticket_slots
    - active_loop: ticket_form

# Fired when user clicks "🚀 Envoyer au technicien"
- rule: Confirm ticket submitted on trigger
  steps:
    - intent: trigger_ticket_submitted
    - action: action_ticket_submitted
- rule: Submit ticket form when all slots filled
  condition:
    # This ensures the rule only applies right when the form completes successfully
    - active_loop: ticket_form
  steps:
    - action: ticket_form
    - active_loop: null  # The form has finished collecting everything
    - action: utter_submit
    - action: action_submit_ticket_draft