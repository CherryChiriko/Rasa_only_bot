version: "3.1"
nlu:
- intent: greet
  examples: |
    - Salut
    - Hello
    - Bonjour
    - Bonsoir
    - Hey
    - Bonsoir !
    - Bonjour, j'ai besoin d'aide

- intent: goodbye
  examples: |
    - Bonne journée
    - Au revoir
    - Bye
    - Bonne soirée
    - À plus tard
    - À bientôt
    - Merci, au revoir

- intent: affirm
  examples: |
    - Oui
    - C'est ça
    - Exactement
    - Absolument
    - Bien sûr
    - Oui, c'est correct
    - Tout à fait
    - Oui, soumettre

- intent: deny
  examples: |
    - Non
    - Pas du tout
    - Pas vraiment
    - Je ne pense pas
    - Je ne crois pas
    - Non, modifier
    - Je veux changer quelque chose

- intent: mood_great
  examples: |
    - Bien
    - Magnifique
    - Très bien
    - Super
    - Fantastique
    - Génial
    - Ça va très bien
    - Parfait
    - Je me sens super
    - Je suis de bonne humeur
    - Tout va bien
    - Je suis content

- intent: mood_unhappy
  examples: |
    - Pas bien
    - Triste
    - Mal
    - Terrible
    - Horrible
    - Ça ne va pas
    - Très mal
    - Pas terrible

- intent: bot_challenge
  examples: |
    - T'es un humain ou un bot ?
    - Es-tu un bot ?
    - Es-tu une IA ?
    - Es-tu un assistant virtuel ?
    - Es-tu un chatbot ?
    - Qui es-tu ?

- intent: report_problem
  examples: |
    - Mon pc ne marche pas
    - J'ai un problème avec mon ordinateur
    - Mon écran est noir
    - Rien ne s'allume
    - J'ai besoin d'aide technique
    - J'ai un problème de connexion
    - Ma carte réseau ne fonctionne pas
    - Mon imprimante est en panne
    - Le logiciel plante
    - Mon compte est bloqué
    - Je n'arrive pas à me connecter au VPN
    - Je veux signaler un problème
    - J'ai un autre problème
    - J'ai un autre probleme
    - J'ai un autre problème avec mon pc
    - J'ai un autre probleme avec mon pc
    - J'ai encore un problème
    - J'ai encore un probleme
    - J'ai de nouveau un problème
    - Il y a un autre souci
    - Autre problème
    - Autre probleme
    - J'ai un nouveau problème à signaler
    - Il m'arrive autre chose
    - Encore un souci
    - Un autre truc ne marche pas
    - Il y a aussi un problème avec
    - Autre chose ne fonctionne pas
    - Et j'ai aussi un problème
    - Signaler un autre incident

- intent: inform
  examples: |
    - Mon id est [XX345](user_id)
    - Mon identifiant est [AA7890](user_id)
    - [AB4521](user_id)
    - Mon numéro est [AB9001](user_id)
    - L'écran affiche une erreur
    - Mon clavier ne répond plus
    - Le message d'erreur dit "accès refusé"
    - Ça se produit depuis ce matin
    - Le problème survient au démarrage

- intent: describe_problem
  examples: |
    - Mon écran reste noir après le démarrage
    - Le logiciel se ferme tout seul
    - Je reçois un message d'erreur 404
    - L'application ne s'ouvre plus
    - Mon clavier ne répond plus du tout
    - La connexion WiFi se coupe toutes les cinq minutes
    - Je n'arrive pas à imprimer
    - Mon profil Windows est corrompu
    - Le VPN refuse mes identifiants
    - Mon imprimante affiche "bourrage papier" et n'imprime plus
    - Je ne peux plus envoyer de mails depuis Outlook
    - L'application interne plante quand j'essaie de me connecter
    - Le poste se met en veille et ne redémarre plus correctement
    - J'ai une erreur "accès refusé" sur le serveur partagé

- intent: edit_ticket
  examples: |
    - Je veux modifier le ticket
    - Changer la description
    - Ce n'est pas correct
    - Je veux corriger quelque chose
    - Modifier mon identifiant
    - Mettre à jour la description
    - Non, je veux changer ça

- intent: new_ticket
  examples: |
    - Créer un nouveau ticket
    - J'ai un autre problème
    - J'ai un autre probleme
    - J'ai encore un problème
    - J'ai encore un probleme
    - J'ai de nouveau un problème
    - J'ai de nouveau un probleme
    - J'ai un autre problème avec mon pc
    - J'ai un autre probleme avec mon pc
    - Signaler un autre incident
    - Nouveau signalement
    - Encore un problème
    - Un autre ticket
    - Ouvrir un nouveau ticket
    - Nouveau problème

- intent: out_of_scope
  examples: |
    - Je veux une recette de cuisine
    - Quel temps fait-il ?
    - Combien font 2+2 ?
    - Parle-moi de la politique
    - C'est quoi la capitale de la France ?

- intent: inform_failure
  examples: |
    - Ce n'est pas utile
    - Mauvaise réponse
    - Tu n'as pas répondu à ma question
    - C'est faux
    - Nul
    - Pas utile

- intent: nlu_fallback
  examples: |
    - asdfghjkl
    - qwertyuiop
    - zzzzzzzzz
    - hsfhgageda
    - blabla gaga
    - 1234567890

# These are never typed by a user — they are triggered programmatically by
# Streamlit via the /trigger_intent endpoint. One example each is enough;
# Rasa won't train a classifier for intents only used in rules.
- intent: trigger_reset_ticket
  examples: |
    - reset ticket

- intent: trigger_ticket_submitted
  examples: |
    - ticket submitted