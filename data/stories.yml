version: "3.1"

stories:

- story: happy path
  steps:
    - intent: greet
    - action: utter_greet
    - intent: mood_great
    - action: utter_happy

- story: unhappy path - resolved
  steps:
    - intent: greet
    - action: utter_greet
    - intent: mood_unhappy
    - action: utter_cheer_up
    - action: utter_did_that_help
    - intent: affirm
    - action: utter_happy

- story: unhappy path - needs ticket
  steps:
    - intent: greet
    - action: utter_greet
    - intent: mood_unhappy
    - action: utter_cheer_up
    - action: utter_did_that_help
    - intent: deny
    - action: utter_default

- story: full ticket flow
  steps:
    - intent: report_problem
    - action: ticket_form
    - active_loop: ticket_form
    - active_loop: null
    - slot_was_set:
        - requested_slot: null
    - action: utter_submit
    - action: action_submit_ticket_draft

- story: inform failure
  steps:
    - intent: inform_failure
    - action: utter_inform_failure