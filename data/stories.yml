version: "3.1"

stories:

- story: happy path
  steps:
    - intent: greet
    - action: utter_greet
    - intent: mood_great
    - action: utter_happy

- story: unhappy path
  steps:
    - intent: greet
    - action: utter_greet
    - intent: mood_unhappy
    - action: utter_cheer_up
    - action: utter_did_that_help
    - intent: affirm
    - action: utter_happy

- story: unhappy path leads to ticket
  steps:
    - intent: greet
    - action: utter_greet
    - intent: mood_unhappy
    - action: utter_cheer_up
    - action: utter_did_that_help
    - intent: deny
    - action: utter_default

- story: full ticket flow - submit
  steps:
    - intent: report_problem
    - action: ticket_form
    - active_loop: ticket_form
    - active_loop: null
    - slot_was_set:
        - requested_slot: null
    - action: utter_confirm_ticket
    - intent: affirm
    - action: action_submit_ticket_draft
    - action: utter_ticket_submitted

- story: full ticket flow - edit then submit
  steps:
    - intent: report_problem
    - action: ticket_form
    - active_loop: ticket_form
    - active_loop: null
    - slot_was_set:
        - requested_slot: null
    - action: utter_confirm_ticket
    - intent: deny
    - action: utter_ticket_edit_prompt
    - action: action_reset_ticket_slots
    - action: ticket_form
    - active_loop: ticket_form
    - active_loop: null
    - slot_was_set:
        - requested_slot: null
    - action: utter_confirm_ticket
    - intent: affirm
    - action: action_submit_ticket_draft
    - action: utter_ticket_submitted

- story: ticket then new ticket
  steps:
    - intent: report_problem
    - action: ticket_form
    - active_loop: ticket_form
    - active_loop: null
    - slot_was_set:
        - requested_slot: null
    - action: utter_confirm_ticket
    - intent: affirm
    - action: action_submit_ticket_draft
    - action: utter_ticket_submitted
    - intent: new_ticket
    - action: utter_new_ticket_prompt
    - action: action_reset_ticket_slots
    - action: ticket_form
    - active_loop: ticket_form

- story: inform failure
  steps:
    - intent: inform_failure
    - action: utter_inform_failure