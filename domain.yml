version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge
  - out_of_scope
  - report_problem
  - inform
  - describe_problem
  - inform_failure
  - nlu_fallback
  - trigger_reset_ticket
  - trigger_ticket_submitted

entities:
  - user_id

slots:
  user_id:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: user_id
      - type: from_text
        conditions:
          - active_loop: ticket_form
            requested_slot: user_id

  # Silent slot — filled from the trigger message, never asked interactively.
  # Provides device/topic context for assembling the final description.
  trigger_context:
    type: text
    influence_conversation: false
    mappings:
      - type: custom
        action: validate_ticket_form

  # Accumulates all user detail messages as a JSON list so multi-message
  # descriptions are handled correctly.
  detail_messages:
    type: text
    influence_conversation: false
    mappings:
      - type: custom
        action: validate_ticket_form

  # Assembled from trigger_context + detail_messages by the extractor.
  problem_description:
    type: text
    influence_conversation: true
    mappings:
      - type: custom
        action: validate_ticket_form

actions:
  - action_submit_ticket_draft
  - action_reset_ticket_slots
  - action_ticket_submitted
  - action_context_aware_fallback
  - validate_ticket_form

forms:
  ticket_form:
    required_slots:
      - problem_description
      - user_id

responses:
  utter_greet:
    - text: "Bonjour ! Je suis votre assistant technique. Comment puis-je vous aider aujourd'hui ?"

  utter_happy:
    - text: "Super ! N'hésitez pas si vous avez besoin d'aide."

  utter_cheer_up:
    - text: "Je suis désolé d'entendre ça. Puis-je faire quelque chose pour vous aider ?"

  utter_did_that_help:
    - text: "Est-ce que cela vous a aidé ?"

  utter_goodbye:
    - text: "Au revoir ! N'hésitez pas à revenir si vous avez besoin d'aide. 👋"

  utter_iamabot:
    - text: "Je suis un assistant virtuel IA dédié au support technique. Je ne suis pas humain, mais je ferai de mon mieux pour vous aider !"

  utter_default:
    - text: "Désolé, je n'ai pas bien compris. Pourriez-vous reformuler votre demande ?"
    - text: "Je ne suis pas sûr de comprendre. Pouvez-vous préciser votre question ?"

  utter_out_of_scope:
    - text: "Désolé, je suis un assistant technique. Je ne peux pas répondre à cette question, mais je peux vous aider à signaler un incident technique."

  utter_inform_failure:
    - text: "Je suis désolé de ne pas avoir pu vous aider. Voulez-vous que je crée un ticket pour qu'un technicien vous rappelle ?"

  utter_ask_user_id:
    - text: "Quel est votre identifiant utilisateur ? (ex: AB4521)"

  utter_ask_problem_description:
    - text: "Décrivez-moi votre problème : quel appareil, quel symptôme, et depuis quand ?"

  utter_submit:
    - text: "Parfait, je prépare votre ticket..."

  utter_new_ticket_prompt:
    - text: "Bien sûr ! Décrivons votre nouveau problème."